resources:
  jobs:
    medallion_job:
      name: medallion_job

      tasks:
        - task_key: bronze
          spark_python_task:
            python_file: ./notebooks/bronze.py

        - task_key: silver
          depends_on:
            - task_key: bronze
          spark_python_task:
            python_file: ./notebooks/silver.py

        - task_key: gold
          depends_on:
            - task_key: silver
          spark_python_task:
            python_file: ./notebooks/gold.py
