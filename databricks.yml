bundle:
  name: medallion_project

targets:
  dev:
    workspace:
      host: https://<your-databricks-workspace-url>
      root_path: /Workspace/dev

  prod:
    workspace:
      host: https://<your-databricks-workspace-url>
      root_path: /Workspace/prod

resources:
  jobs:
    medallion_job:
      name: medallion_job

      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/bronze.py

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/silver.py

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ./notebooks/gold.py
