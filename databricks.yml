bundle:
  name: Databricks_CICD_DABS

targets:
  dev:
    workspace:
      host: https://dbc-2be94ce7-0045.cloud.databricks.com
      root_path: /Workspace/dev

  prod:
    workspace:
      host: https://dbc-2be94ce7-0045.cloud.databricks.com
      root_path: /Workspace/prod

resources:
  jobs:
    medallion_job:
      name: medallion_job

      job_clusters:
        - job_cluster_key: medallion_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.large
            num_workers: 1

      tasks:
        - task_key: bronze
          job_cluster_key: medallion_cluster
          spark_python_task:
            python_file: ./notebooks/bronze.py
          max_retries: 1

        - task_key: silver
          job_cluster_key: medallion_cluster
          depends_on:
            - task_key: bronze
          spark_python_task:
            python_file: ./notebooks/silver.py
          max_retries: 1

        - task_key: gold
          job_cluster_key: medallion_cluster
          depends_on:
            - task_key: silver
          spark_python_task:
            python_file: ./notebooks/gold.py
          max_retries: 1
